<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>历史 - OpenConverter</title>
<link rel="stylesheet" href="_common.css">
</head>
<body>
  <div class="phone">
    <div class="statusbar"><span>20:14</span><span>5G 48%</span></div>

    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <defs>
              <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1ed760"/>
                <stop offset="100%" stop-color="#1db954"/>
              </linearGradient>
              <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#181818"/>
                <stop offset="100%" stop-color="#121212"/>
              </linearGradient>
            </defs>
            <circle cx="256" cy="256" r="240" fill="url(#lg2)" stroke="#282828" stroke-width="8"/>
            <circle cx="256" cy="256" r="200" fill="none" stroke="url(#lg1)" stroke-width="12" opacity="0.8"/>
            <rect x="120" y="180" width="40" height="120" rx="20" fill="url(#lg1)"/>
            <rect x="180" y="140" width="40" height="180" rx="20" fill="url(#lg1)" opacity="0.9"/>
            <rect x="240" y="100" width="40" height="240" rx="20" fill="url(#lg1)" opacity="0.85"/>
            <rect x="300" y="140" width="40" height="180" rx="20" fill="url(#lg1)" opacity="0.9"/>
            <rect x="360" y="180" width="40" height="120" rx="20" fill="url(#lg1)"/>
          </svg>
        </div>
        <span class="brand-text">OpenConverter</span>
        <span class="brand-version">v0.4.0</span>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn">清空</button>
      </div>
    </div>
    <div class="progress-strip"></div>

    <div class="content">
      <div class="section-title">
        <span>今天</span>
        <span class="count">2 项</span>
      </div>
      <div class="file-list">
        <div class="file-card">
          <div class="file-info">
            <div class="name">DJ小女孩-我知道.flac</div>
            <div class="meta">
              <span class="format-badge">FLAC</span>
              <span>12.1 MB</span>
              <span class="separator">·</span>
              <span>14:32</span>
            </div>
          </div>
        </div>
        <div class="file-card">
          <div class="file-info">
            <div class="name">周杰伦-晴天.flac</div>
            <div class="meta">
              <span class="format-badge">FLAC</span>
              <span>17.4 MB</span>
              <span class="separator">·</span>
              <span>13:58</span>
            </div>
          </div>
        </div>
      </div>

      <div class="section-title">
        <span>昨天</span>
        <span class="count">3 项</span>
      </div>
      <div class="file-list">
        <div class="file-card">
          <div class="file-info">
            <div class="name">Taylor Swift - Anti-Hero.flac</div>
            <div class="meta">
              <span class="format-badge">FLAC</span>
              <span>8.7 MB</span>
              <span class="separator">·</span>
              <span>18:21</span>
            </div>
          </div>
        </div>
        <div class="file-card">
          <div class="file-info">
            <div class="name">陈奕迅-十年.flac</div>
            <div class="meta">
              <span class="format-badge">FLAC</span>
              <span>11.5 MB</span>
              <span class="separator">·</span>
              <span>09:35</span>
            </div>
          </div>
        </div>
        <div class="file-card" style="opacity:0.6">
          <div class="file-info">
            <div class="name">unknown.xyz</div>
            <div class="meta">
              <span class="format-badge unknown">FAILED</span>
              <span style="color:var(--negative)">不支持的格式</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <a class="nav-item"><span>主页</span></a>
      <a class="nav-item active"><span>历史</span></a>
      <a class="nav-item"><span>设置</span></a>
      <a class="nav-item"><span>关于</span></a>
    </div>
  </div>
</body>
</html>
