<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>主页 - OpenConverter</title>
<link rel="stylesheet" href="_common.css">
</head>
<body>
  <div class="phone">
    <div class="statusbar"><span>20:14</span><span>5G 48%</span></div>

    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <defs>
              <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1ed760"/>
                <stop offset="100%" stop-color="#1db954"/>
              </linearGradient>
              <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#181818"/>
                <stop offset="100%" stop-color="#121212"/>
              </linearGradient>
            </defs>
            <circle cx="256" cy="256" r="240" fill="url(#lg2)" stroke="#282828" stroke-width="8"/>
            <circle cx="256" cy="256" r="200" fill="none" stroke="url(#lg1)" stroke-width="12" opacity="0.8"/>
            <rect x="120" y="180" width="40" height="120" rx="20" fill="url(#lg1)"/>
            <rect x="180" y="140" width="40" height="180" rx="20" fill="url(#lg1)" opacity="0.9"/>
            <rect x="240" y="100" width="40" height="240" rx="20" fill="url(#lg1)" opacity="0.85"/>
            <rect x="300" y="140" width="40" height="180" rx="20" fill="url(#lg1)" opacity="0.9"/>
            <rect x="360" y="180" width="40" height="120" rx="20" fill="url(#lg1)"/>
          </svg>
        </div>
        <span class="brand-text">OpenConverter</span>
        <span class="brand-version">v0.4.0</span>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn">搜索</button>
        <button class="icon-btn">主题</button>
      </div>
    </div>
    <div class="progress-strip"></div>

    <div class="content">
      <div class="section-title"><span>输出</span></div>
      <div class="folder-row">
        <div class="folder-info">
          <div class="label">输出文件夹</div>
          <div class="path">Download/OpenConverter</div>
        </div>
        <button class="folder-change">更改</button>
      </div>

      <div class="section-title"><span>输出格式</span></div>
      <div class="format-chips">
        <button class="chip">MP3</button>
        <button class="chip active">FLAC</button>
        <button class="chip">WAV</button>
        <button class="chip">M4A</button>
        <button class="chip">OGG</button>
      </div>

      <div class="section-title">
        <span>文件队列</span>
        <span class="count">3 个 · 18.4 MB</span>
      </div>
      <div class="file-list">
        <div class="file-card selected">
          <div class="file-info">
            <div class="name">DJ小女孩-我知道.mp3</div>
            <div class="meta">
              <span class="format-badge">MP3</span>
              <span>7.3 MB</span>
              <span class="separator">·</span>
              <span>256 KBPS</span>
            </div>
          </div>
        </div>
        <div class="file-card">
          <div class="file-info">
            <div class="name">周杰伦-晴天.mflac</div>
            <div class="meta">
              <span class="format-badge" style="color:var(--announcement)">MFLAC</span>
              <span>9.8 MB</span>
              <span class="separator">·</span>
              <span>QMC V2</span>
            </div>
          </div>
        </div>
        <div class="file-card">
          <div class="file-info">
            <div class="name">陈奕迅-十年.ncm</div>
            <div class="meta">
              <span class="format-badge" style="color:var(--warning)">NCM</span>
              <span>1.3 MB</span>
              <span class="separator">·</span>
              <span>网易云</span>
            </div>
          </div>
        </div>
      </div>

      <button class="folder-change" style="width:100%;padding:10px;margin-top:8px;font-size:12px">+ 添加更多文件</button>
    </div>

    <button class="fab" title="开始转换">开始转换</button>

    <div class="bottom-nav">
      <a class="nav-item active"><span>主页</span></a>
      <a class="nav-item"><span>历史</span></a>
      <a class="nav-item"><span>设置</span></a>
      <a class="nav-item"><span>关于</span></a>
    </div>
  </div>
</body>
</html>
