<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: Spotify dark theme -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#181818"/>
      <stop offset="100%" style="stop-color:#121212"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ed760"/>
      <stop offset="100%" style="stop-color:#1db954"/>
    </linearGradient>
  </defs>

  <!-- Main Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" stroke="#282828" stroke-width="8"/>

  <!-- Inner Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#greenGradient)" stroke-width="12" opacity="0.8"/>

  <!-- Audio Wave Bars (Spotify-inspired) -->
  <rect x="120" y="180" width="40" height="120" rx="20" fill="url(#greenGradient)"/>
  <rect x="180" y="140" width="40" height="180" rx="20" fill="url(#greenGradient)" opacity="0.9"/>
  <rect x="240" y="100" width="40" height="240" rx="20" fill="url(#greenGradient)" opacity="0.85"/>
  <rect x="300" y="140" width="40" height="180" rx="20" fill="url(#greenGradient)" opacity="0.9"/>
  <rect x="360" y="180" width="40" height="120" rx="20" fill="url(#greenGradient)"/>
</svg>
